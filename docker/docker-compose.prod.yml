version: '3.9'

# Production — usage:
#   docker compose -f docker/docker-compose.prod.yml up -d --build
#
# Build context est la RACINE du monorepo (../) pour que pnpm puisse
# résoudre les workspace packages (packages/shared, etc.).

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pokegrind}
      POSTGRES_USER: ${POSTGRES_USER:-pokegrind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pokegrind} -d ${POSTGRES_DB:-pokegrind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile.prod
    restart: always
    ports:
      - "3333:3333"
    env_file: ../apps/api/.env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-pokegrind}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pokegrind}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile.prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: https://pokegrind.fr/api
    depends_on:
      - api

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile.prod
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web
      - admin

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    restart: always
    volumes:
      - /opt/pokegrind/backups:/backups
      - redis_data:/redis-data:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-pokegrind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pokegrind}
      REDIS_HOST: redis
      KEEP_DAYS: "7"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
