version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pokegrind
      POSTGRES_USER: pokegrind
      POSTGRES_PASSWORD: dev_password_change_in_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokegrind -d pokegrind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "3333:3333"
    env_file: ../apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../apps/api:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://pokegrind:dev_password_change_in_prod@postgres:5432/pokegrind
      REDIS_URL: redis://redis:6379

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    environment:
      API_BASE_URL: http://api:3333

  admin:
    build:
      context: ../apps/admin
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    depends_on:
      - api
    volumes:
      - ../apps/admin:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://api:3333

volumes:
  postgres_data:
  redis_data:
